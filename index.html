<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DJJ 财务报表</title>
<script src="https://cdn.jsdelivr.net/npm/hyperformula@2.7.0/dist/hyperformula.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#ffffff;
  --surface:#fafafa;
  --surface-2:#f4f4f5;
  --border:#e4e4e7;
  --border-strong:#d4d4d8;
  --ink:#18181b;
  --ink-soft:#52525b;
  --ink-mute:#71717a;
  --ink-faint:#a1a1aa;
  --accent:#1e40af;
  --accent-soft:#dbeafe;
  --accent-mute:#eff6ff;
  --pos:#15803d;
  --neg:#b91c1c;
  --warn:#a16207;
  --sydney:#dbeafe;     /* light blue */
  --brisbane:#fed7aa;   /* light orange */
  --perth:#e9d5ff;      /* light purple */
  --sydney-ink:#1e3a8a;
  --brisbane-ink:#7c2d12;
  --perth-ink:#581c87;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--ink);
  font-size:13px;line-height:1.5;
}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ---------- Top bar ---------- */
.topbar{
  display:flex;align-items:center;gap:18px;
  padding:10px 20px;background:var(--bg);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.brand{display:flex;align-items:baseline;gap:10px}
.brand .logo{font-weight:600;font-size:15px;letter-spacing:.5px;color:var(--accent)}
.brand .sub{font-size:11px;color:var(--ink-faint);letter-spacing:.3px}
.spacer{flex:1}

.ctrl{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:var(--ink-soft);font-family:inherit;
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:5px 10px;cursor:pointer;
  transition:.12s;outline:none;
}
.ctrl:hover{border-color:var(--border-strong);background:var(--surface)}
.ctrl:focus{border-color:var(--accent)}
.ctrl.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.ctrl.primary:hover{background:#1d4ed8}
.ctrl.ghost{background:transparent}
.ctrl:disabled{opacity:.5;cursor:not-allowed}

.month-picker{display:inline-flex;align-items:center;gap:8px}
.month-picker label{font-size:11px;color:var(--ink-faint)}

.sync-pill{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;color:var(--ink-mute);padding:4px 9px;
  border-radius:99px;background:var(--surface);border:1px solid var(--border);
}
.sync-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--ink-faint)}
.sync-pill.ok .dot{background:var(--pos)}
.sync-pill.saving .dot{background:var(--warn);animation:pulse 1s infinite}
.sync-pill.err .dot{background:var(--neg)}
@keyframes pulse{50%{opacity:.4}}

/* ---------- Tabs ---------- */
.tabs-wrap{border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.tabs{
  display:flex;gap:0;padding:0 14px;max-width:100%;overflow-x:auto;
}
.tab{
  padding:10px 14px;font-size:12.5px;font-weight:500;color:var(--ink-mute);
  border:none;background:transparent;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:.12s;font-family:inherit;
}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{
  font-size:10px;padding:1px 5px;border-radius:4px;margin-left:6px;
  background:var(--surface-2);color:var(--ink-faint);vertical-align:1px;
  font-weight:400;
}
.tab.active .badge{background:var(--accent-mute);color:var(--accent)}

/* ---------- Workspace ---------- */
.workspace{flex:1;overflow:auto;padding:24px;background:var(--surface)}
.sheet-wrap{max-width:100%;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:none}}

.sheet-head{
  display:flex;align-items:center;gap:14px;margin-bottom:6px;flex-wrap:wrap;
}
.sheet-head h2{font-weight:600;font-size:18px;color:var(--ink);letter-spacing:-.2px}
.sheet-head .en{font-size:11.5px;color:var(--ink-faint)}
.sheet-head .tag{
  font-size:10.5px;padding:2px 8px;border-radius:99px;font-weight:500;
  background:var(--surface-2);color:var(--ink-soft);
}
.sheet-head .tag.auto{background:var(--accent-mute);color:var(--accent)}
.sheet-head .tag.input{background:#f0fdf4;color:var(--pos)}
.store-filter{display:inline-flex;align-items:center;gap:6px;margin-left:auto}
.store-filter label{font-size:11px;color:var(--ink-faint)}

.sheet-hint{font-size:11.5px;color:var(--ink-mute);margin-bottom:14px;display:flex;gap:14px;flex-wrap:wrap}
.sheet-hint b{color:var(--ink-soft);font-weight:500}
.legend{display:inline-flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block;border:1px solid var(--border)}
.legend i.fill-input{background:#fff}
.legend i.fill-formula{background:#f0f9ff}
.legend i.fill-linked{background:#ecfdf5}

/* ---------- Grid ---------- */
.grid-scroll{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  overflow:auto;max-height:calc(100vh - 230px);
}
table.grid{border-collapse:separate;border-spacing:0;font-size:12.5px;width:100%}
table.grid th,table.grid td{
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:0;height:30px;position:relative;background:var(--bg);
}
table.grid th{
  position:sticky;top:0;z-index:5;background:var(--surface);
  color:var(--ink-soft);font-weight:500;text-align:center;padding:0;
}
table.grid thead .hcell{
  padding:7px 9px;font-size:11.5px;line-height:1.25;
  display:flex;align-items:center;justify-content:center;min-height:28px;
  white-space:normal;
}
/* group headers */
table.grid thead tr.hgroup th.g-sydney{background:var(--sydney);color:var(--sydney-ink)}
table.grid thead tr.hgroup th.g-brisbane{background:var(--brisbane);color:var(--brisbane-ink)}
table.grid thead tr.hgroup th.g-perth{background:var(--perth);color:var(--perth-ink)}
table.grid thead tr.hgroup th.g-neutral{background:var(--surface-2);color:var(--ink-soft)}
table.grid thead tr.hsub th{top:36px;z-index:4;background:var(--surface);font-weight:500}
table.grid thead tr.hsub th.g-sydney{background:#eff6ff}
table.grid thead tr.hsub th.g-brisbane{background:#fff7ed}
table.grid thead tr.hsub th.g-perth{background:#faf5ff}

/* Column resize grip */
table.grid thead th{user-select:none}
.col-resize{
  position:absolute;top:0;right:-3px;width:6px;height:100%;
  cursor:col-resize;z-index:6;
  background:transparent;
}
.col-resize:hover{background:var(--accent);opacity:.4}
.col-resize:active{background:var(--accent);opacity:.7}

/* Pending margin banner & row tint */
.pending-banner{
  display:flex;gap:12px;align-items:flex-start;
  background:#fef3c7;border:1px solid #f59e0b;
  border-radius:6px;padding:10px 14px;margin-bottom:12px;
  font-size:12px;color:#78350f;
}
.pb-icon{font-size:18px;line-height:1.2;flex-shrink:0}
.pb-body{flex:1;min-width:0}
.pb-title{font-weight:500;margin-bottom:3px}
.pb-title b{color:#b45309}
.pb-list{font-size:11.5px;color:#92400e;line-height:1.5;word-break:break-all}
.pb-list b{color:#78350f;font-weight:600}

table.grid tr.pending-margin td{background:#fffbeb}
table.grid tr.pending-margin td.editable{background:#fffbeb}
table.grid tr.pending-margin td.editable:hover{background:#fef3c7}
table.grid tr.pending-margin td.auto{background:#fef3c7}
table.grid tr.pending-margin td.formula{background:#fef3c7}
table.grid td.pending-icon .warn-icon{
  position:absolute;top:50%;left:5px;transform:translateY(-50%);
  font-size:13px;color:#d97706;
}
table.grid td.pending-icon .btn-delrow{display:none}
tr.pending-margin:hover td.pending-icon .warn-icon{display:none}
tr.pending-margin:hover td.pending-icon .btn-delrow{display:flex}

/* Subtotal row (month-level summary) */
tr.subtotal-row td{
  background:#f0f9ff;border-top:1.5px solid #93c5fd;border-bottom:1px solid #93c5fd;
  font-weight:600;
}
tr.subtotal-row.sum-total td{
  background:#dbeafe;border-top:2px solid var(--accent);
}
tr.subtotal-row.sum-total td .cell{color:var(--accent);font-weight:700}
tr.subtotal-row.sum-store td{background:#eff6ff}
tr.subtotal-row.sum-store td .cell{color:var(--accent);font-weight:500}
tr.subtotal-row td .cell{padding:7px 9px;color:var(--accent)}
tr.subtotal-row td.subtotal-label .cell{font-weight:600;color:var(--accent)}
tr.subtotal-row td.subtotal-cell .cell{font-weight:600;color:var(--accent)}
tr.subtotal-row td.subtotal-cell.neg .cell{color:var(--neg)}

/* Adjustment section */
tr.adj-section-header td{
  background:#fef3c7;border-top:2px solid #f59e0b;border-bottom:1px solid #fcd34d;
  padding:0;
}
tr.adj-section-header td .cell{
  padding:7px 12px;font-weight:600;color:#92400e;font-size:12px;
}
tr.adj-row td{background:#fffbeb;border:none;border-bottom:1px solid #fde68a;padding:0}
tr.adj-row.adj-real td{background:#ecfdf5;border-top:1px solid #6ee7b7;border-bottom:2px solid #6ee7b7}
.adj-line{
  display:flex;align-items:center;gap:18px;padding:8px 12px;flex-wrap:wrap;
  font-size:12px;color:#78350f;
}
.adj-row.adj-real .adj-line{color:#065f46}
.adj-label{font-weight:500;min-width:240px;color:#92400e}
.adj-row.adj-real .adj-label{color:#047857;font-weight:600}
.adj-real-label{font-weight:700}
.adj-val{display:inline-flex;align-items:center;gap:4px;color:#92400e}
.adj-val b{color:#78350f;font-family:'SF Mono',Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
.adj-row.adj-real .adj-val{color:#047857}
.adj-row.adj-real .adj-val b{color:#065f46}
.adj-row.adj-real .adj-val b.neg{color:var(--neg)}
.adj-detail{color:#a16207;font-size:11px;font-style:italic;flex-basis:100%;margin-top:3px;padding-left:8px}
.adj-input-box{
  width:100px;border:1px solid #fcd34d;background:#fff;border-radius:4px;
  padding:3px 8px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:12px;
  text-align:right;color:#78350f;outline:none;
}
.adj-input-box:focus{border-color:#f59e0b;box-shadow:0 0 0 2px #fde68a}

/* Historical (non-editable) rows */
tr.historical td{background:#fafafa}
tr.historical td.editable{background:#fafafa;cursor:default}
tr.historical td.editable:hover{background:#fafafa;box-shadow:none}
tr.historical .btn-delrow{display:none !important}
tr.historical.pending-margin td{background:#fef9e7}
tr.historical td.auto, tr.historical td.formula{background:#f4f4f5}
/* row control column (delete button) */
table.grid th.rowctrl,table.grid td.rowctrl{
  width:26px;min-width:26px;max-width:26px;padding:0;
  background:var(--bg);border-right:none;
}
table.grid td.rowctrl{position:relative}
.btn-delrow{
  position:absolute;top:50%;left:4px;transform:translateY(-50%);
  width:18px;height:18px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg);color:var(--ink-faint);font-size:14px;line-height:1;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  padding:0;transition:.12s;
}
tr.mgrow:hover .btn-delrow{display:flex}
.btn-delrow:hover{border-color:var(--neg);color:var(--neg);background:#fef2f2}

table.grid td .cell{
  width:100%;height:100%;padding:5px 9px;display:flex;align-items:center;
  min-height:30px;white-space:pre;overflow:hidden;
}
table.grid td.label .cell{white-space:normal;line-height:1.3;font-size:12px}
table.grid td.num .cell{
  justify-content:flex-end;
  font-family:'SF Mono',Menlo,Consolas,monospace;
  font-variant-numeric:tabular-nums;font-size:12px;
}
table.grid td.formula{background:#f0f9ff}
table.grid td.formula .cell{color:var(--ink-soft)}
table.grid td.linked{background:#ecfdf5}
table.grid td.linked .cell{color:var(--pos);font-weight:500}
table.grid td.auto{background:var(--surface-2)}
table.grid td.auto .cell{color:var(--ink-mute);font-style:italic;font-size:11.5px}
table.grid td.editable{background:var(--bg);cursor:text}
table.grid td.editable:hover{background:var(--accent-mute);box-shadow:inset 0 0 0 1px var(--accent-soft)}
table.grid td.editing{box-shadow:inset 0 0 0 2px var(--accent);background:var(--bg)}
table.grid td.sel{background:var(--accent-mute)!important}
table.grid td.sel-anchor{box-shadow:inset 0 0 0 1.5px var(--accent)}
table.grid td.dropdown.editable .cell::after{
  content:'▾';color:var(--ink-faint);margin-left:auto;font-size:10px;padding-left:6px;
}
table.grid td.editing.dropdown{padding:0}
table.grid td select.editor{
  display:block;width:100%;min-height:30px;
  border:none;outline:none;background:var(--bg);
  font-family:inherit;font-size:12.5px;padding:4px 8px;color:var(--ink);
  box-sizing:border-box;cursor:pointer;
}
table.grid td input.editor{
  width:100%;height:100%;border:none;outline:none;background:var(--bg);
  font-family:'SF Mono',Menlo,Consolas,monospace;font-size:12px;padding:5px 9px;
  text-align:right;color:var(--ink);
}
table.grid td.text input.editor{text-align:left;font-family:inherit}
.neg{color:var(--neg)}
.pos{color:var(--pos)}
td.pct .cell{color:var(--ink-soft)}
tr.empty td{height:6px;background:transparent;border:none}
tr.total td{border-top:2px solid var(--border-strong);background:var(--surface);font-weight:600}
tr.total td .cell{font-weight:600}

/* ➕ insert row */
tr.addrow td{
  padding:5px;background:var(--surface);border-right:none;
  border-top:1px dashed var(--border);
}
.btn-addrow{
  width:100%;padding:7px;border:1px dashed var(--border-strong);background:transparent;
  color:var(--ink-mute);font-family:inherit;font-size:12px;font-weight:500;
  border-radius:5px;cursor:pointer;transition:.12s;
}
.btn-addrow:hover{background:var(--accent-mute);border-color:var(--accent);color:var(--accent)}

/* footer row */
tr.footer-row td{background:#fffbeb;border-top:2px solid #fbbf24}
tr.footer-row td .cell{padding:8px 9px;font-size:12px;color:var(--ink)}
tr.footer-row td.footer-label .cell{font-weight:600;color:var(--warn)}
tr.footer-row td.footer-auto .cell b{color:var(--ink-mute);font-weight:400;margin-right:4px;font-size:11px}
tr.footer-row td.footer-input .cell{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
tr.footer-row td.footer-input .cell b{color:var(--ink-mute);font-weight:400;font-size:11px;white-space:nowrap}
tr.footer-row input.finput{
  flex:1;min-width:50px;border:1px solid var(--border);background:#fff;
  padding:3px 6px;font-family:inherit;font-size:12px;color:var(--ink);
  border-radius:4px;outline:none;
}
tr.footer-row input.finput:focus{border-color:#fbbf24}

.formula-bar{
  display:flex;align-items:center;gap:10px;padding:6px 12px;
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  margin-bottom:10px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11.5px;
  color:var(--ink-mute);min-height:30px;
}
.formula-bar .addr{color:var(--accent);font-weight:500;min-width:120px;font-family:inherit;font-size:11px}
.formula-bar .fx{color:var(--ink-mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---------- Modal ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(24,24,27,.4);
  display:none;align-items:center;justify-content:center;z-index:100;
}
.overlay.show{display:flex}
.modal{
  background:var(--bg);border-radius:10px;padding:22px;max-width:440px;width:92%;
  border:1px solid var(--border);box-shadow:0 20px 50px rgba(0,0,0,.15);
  animation:pop .15s ease;
}
@keyframes pop{from{transform:scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-weight:600;font-size:15px;margin-bottom:6px}
.modal p{color:var(--ink-soft);font-size:12.5px;margin-bottom:14px}
.modal label{display:block;font-size:11px;color:var(--ink-mute);margin:10px 0 4px}
.modal input,.modal select{width:100%;text-align:left;cursor:text;padding:6px 10px;font-size:12.5px}
.modal .row{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.modal .field-note{font-size:11px;color:var(--ink-faint);margin-top:4px}
.banner{
  padding:9px 12px;border-radius:6px;font-size:11.5px;margin-bottom:12px;
  background:var(--accent-mute);color:var(--accent);border:1px solid var(--accent-soft);
}

.loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:200;flex-direction:column;gap:12px}
.loading .spin{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--ink-mute);font-size:12.5px}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:9px 16px;border-radius:6px;font-size:12.5px;
  opacity:0;transition:.2s;z-index:150;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--neg)}

::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:5px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#a1a1aa}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spin"></div><p>正在加载…</p></div>

<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="brand">
      <span class="logo">DJJ</span>
      <span class="sub">财务报表 · Financial Reports</span>
    </div>
    <div class="spacer"></div>
    <div class="month-picker">
      <label>月份</label>
      <select class="ctrl" id="monthSelect"></select>
      <button class="ctrl ghost" id="newMonthBtn">＋ 新月份</button>
    </div>
    <div class="sync-pill" id="syncStatus"><span class="dot"></span><span class="txt">本地模式</span></div>
    <button class="ctrl ghost" id="cloudBtn">☁ 云端</button>
  </div>

  <div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>

  <div class="workspace">
    <div class="sheet-wrap" id="sheetWrap"></div>
  </div>
</div>

<div class="overlay" id="newMonthModal">
  <div class="modal">
    <h3>创建新月份</h3>
    <p>新月份将保留全部表结构与公式，数据清空。损益表「上月」列自动带入所选基准月数据。</p>
    <label>新月份</label>
    <input class="ctrl" type="month" id="newMonthInput" />
    <label>以哪个月为基准</label>
    <select class="ctrl" id="baseMonthSelect"></select>
    <div class="row">
      <button class="ctrl ghost" id="newMonthCancel">取消</button>
      <button class="ctrl primary" id="newMonthConfirm">创建</button>
    </div>
  </div>
</div>

<div class="overlay" id="cloudModal">
  <div class="modal">
    <h3>连接 Supabase</h3>
    <p>填入 URL 和 anon/publishable key，跨设备同步。留空只用本机存储。</p>
    <div class="banner">配置只存在本机浏览器，不会上传仓库。</div>
    <label>Supabase URL</label>
    <input class="ctrl" type="text" id="supaUrl" placeholder="https://xxxx.supabase.co" />
    <label>Anon / Publishable Key</label>
    <input class="ctrl" type="text" id="supaKey" placeholder="sb_publishable_... 或 eyJ..." />
    <div class="row">
      <button class="ctrl ghost" id="cloudDisconnect">断开</button>
      <button class="ctrl ghost" id="cloudCancel">取消</button>
      <button class="ctrl primary" id="cloudConnect">连接并同步</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DJJ Finance v2 — single-file edition
   Schema-driven: edit SHEETS config below to change fields
   ============================================================ */

/* ============================================================
   SCHEMA DEFINITION
   - Each sheet defines its columns + types
   - 'data' sheets are user-input (auto-cleared each month)
   - 'recon' is the central aggregator (formulas pulling from data sheets)
   - 'pl' are profit/loss statements (formulas pulling from recon)
   - Column types: text, money, pct, date, auto-serial, auto-month, dropdown
   ============================================================ */

const STORES = ['悉尼','布里斯班','珀斯'];

const SHEETS = [
  // ===== DATA SHEETS (user input) =====
  {
    key:'sales', name:'机型销售统计', en:'Sales by Model', kind:'data',
    columns:[

/* ============================================================
   PER-MONTH DATA ACCESSORS
   Each row in a managed sheet belongs to a specific month.
   These helpers read/write to the right month (current = STATE, others = localStorage)
   ============================================================ */
function getMonthRows(month, sheetKey){
  if(month === STATE.month){
    if(!STATE.data[sheetKey]) STATE.data[sheetKey] = [];
    return STATE.data[sheetKey];
  }
  const raw = localStorage.getItem(LS_BOOK(month));
  if(!raw) return [];
  try{ const b = JSON.parse(raw); return (b.data && b.data[sheetKey]) || []; }
  catch(e){ return []; }
}
function saveMonthRows(month, sheetKey, rows){
  if(month === STATE.month){
    STATE.data[sheetKey] = rows;
    saveMonth();
    return;
  }
  const raw = localStorage.getItem(LS_BOOK(month));
  let book = {data:{}, inputs:{}};
  if(raw){ try{ book = JSON.parse(raw); }catch(e){} }
  if(!book.data) book.data = {};
  book.data[sheetKey] = rows;
  localStorage.setItem(LS_BOOK(month), JSON.stringify(book));
  const months = listMonths();
  if(!months.includes(month)){
    months.push(month);
    saveMonthsList(months);
  }
}
function setMonthCell(month, sheetKey, rowIdx, colKey, value, colType){
  const rows = getMonthRows(month, sheetKey);
  while(rows.length <= rowIdx) rows.push({});
  let parsed = value;
  if(value !== '' && (colType==='money' || colType==='number')){
    const cleaned = String(value).replace(/[$,\s]/g,'').trim();
    const n = Number(cleaned);
    if(!isNaN(n) && cleaned!=='') parsed = n;
  }
  if(value===''){ delete rows[rowIdx][colKey]; }
  else { rows[rowIdx][colKey] = parsed; }
  // Track 调入: when cost is filled in a different month than the row's month, mark it
  if(colKey==='cost' && value!=='' && sheetKey==='sales'){
    if(!rows[rowIdx].__costFilledMonth && month !== STATE.month){
      // Cost filled later — this is a 调入 candidate
      rows[rowIdx].__costFilledMonth = STATE.month;
    } else if(!rows[rowIdx].__costFilledMonth){
      rows[rowIdx].__costFilledMonth = month;  // filled in same month
    }
  }
  saveMonthRows(month, sheetKey, rows);
}
function addMonthRow(month, sheetKey){
  const rows = getMonthRows(month, sheetKey);
  rows.push({});
  saveMonthRows(month, sheetKey, rows);
}
function deleteMonthRow(month, sheetKey, rowIdx){
  const rows = getMonthRows(month, sheetKey);
  rows.splice(rowIdx, 1);
  saveMonthRows(month, sheetKey, rows);
}

function installColResize(){
  // Delegated mousedown on .col-resize handles
  if(window.__djj_resize_installed) return;
  window.__djj_resize_installed = true;
  document.addEventListener('mousedown', e=>{
    const grip = e.target.closest('.col-resize');
    if(!grip) return;
    e.preventDefault();
    const th = grip.closest('th');
    const colKey = grip.dataset.col;
    const startX = e.clientX;
    const startW = th.getBoundingClientRect().width;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(ev){
      const dx = ev.clientX - startX;
      const newW = Math.max(40, Math.round(startW + dx));
      th.style.width = newW + 'px';
      th.style.minWidth = newW + 'px';
      th.style.maxWidth = newW + 'px';
    }
    function onUp(){
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      const finalW = th.getBoundingClientRect().width;
      setColWidth(STATE.sheetKey, colKey, Math.round(finalW));
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}
const $ = s => document.querySelector(s);
function toast(msg, err=false){ const t=$('#toast'); t.textContent=msg; t.className='toast show'+(err?' err':''); setTimeout(()=>t.className='toast',2000); }
function num(v){
  if(v===null||v===undefined||v==='') return 0;
  if(typeof v==='number') return isNaN(v)?0:v;
  // Strip $, commas, spaces from strings before parsing
  const cleaned = String(v).replace(/[$,\s]/g,'').trim();
  if(cleaned==='') return 0;
  const n = Number(cleaned);
  return isNaN(n) ? 0 : n;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function fmtMoney(v){
  if(v===null||v===undefined||v==='') return '';
  const n=Number(v); if(isNaN(n)) return String(v);
  const neg=n<0, abs=Math.abs(n);
  const s=abs.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return (neg?'-':'')+'$'+s;
}
function fmtNum(v){
  if(v===null||v===undefined||v==='') return '';
  const n=Number(v); if(isNaN(n)) return String(v);
  return n.toLocaleString('en-US',{maximumFractionDigits:2});
}
function fmtPct(v){
  if(v===null||v===undefined||v==='') return '';
  const n=Number(v); if(isNaN(n)) return String(v);
  return (n*100).toLocaleString('en-US',{maximumFractionDigits:1})+'%';
}
function shiftMonth(ym,delta){
  const [y,m]=ym.split('-').map(Number);
  const d=new Date(y,m-1+delta,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(ym){ const [y,m]=ym.split('-'); return `${y}.${m}`; }
function thisMonth(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

   ============================================================ */
const STATE = {
  month: thisMonth(),
  sheetKey: SHEETS[0].key,
  storeFilter: '全部',
  monthFilter: '全部',   // '全部' = all months, or 'YYYY-MM' for specific
  data: {},
  inputs: {},
};
const LS_MONTHS = 'djj2_months';
const LS_BOOK = m => 'djj2_book_'+m;
const LS_CLOUD = 'djj2_cloud';

function listMonths(){
  const raw=localStorage.getItem(LS_MONTHS);
  let arr=raw?JSON.parse(raw):[];
  if(!arr.includes(STATE.month)) arr.push(STATE.month);
  return [...new Set(arr)].sort().reverse();
}
function saveMonthsList(arr){ localStorage.setItem(LS_MONTHS, JSON.stringify([...new Set(arr)].sort())); }

function loadMonth(month){
  const raw = localStorage.getItem(LS_BOOK(month));
  if(raw){
    try{ const b=JSON.parse(raw); STATE.data = b.data||{}; STATE.inputs = b.inputs||{}; return; }catch(e){}
  }
  // fresh empty month
  STATE.data = {};
  STATE.inputs = {};
  // Equipment is persistent — copy from any prior month if exists
  const months = listMonths().filter(m=>m!==month);
  for(const prior of months){
    const priorRaw = localStorage.getItem(LS_BOOK(prior));
    if(priorRaw){
      try{
        const pb = JSON.parse(priorRaw);
        for(const sh of SHEETS){
          if(sh.kind==='data' && sh.persistAcrossMonths && pb.data && pb.data[sh.key]){
            STATE.data[sh.key] = JSON.parse(JSON.stringify(pb.data[sh.key]));
          }
        }
      }catch(e){}
      break;
    }
  }
}
function saveMonth(){
  localStorage.setItem(LS_BOOK(STATE.month), JSON.stringify({data:STATE.data, inputs:STATE.inputs}));
  const months = listMonths(); if(!months.includes(STATE.month)) months.push(STATE.month);
  saveMonthsList(months);
}

/* ============================================================
   PENDING MARGIN — sales rows with price but no cost
   ============================================================ */
function scanPendingMargin(){
  // Returns array of {month, rowIndex, row} across all months
  const result = [];
  const months = listMonths();
  for(const m of months){
    let book;
    if(m === STATE.month){
      book = {data:STATE.data, inputs:STATE.inputs};
    } else {
      const raw = localStorage.getItem(LS_BOOK(m));
      if(!raw) continue;
      try{ book = JSON.parse(raw); }catch(e){ continue; }
    }
    const rows = (book.data && book.data.sales) || [];
    rows.forEach((r,i)=>{
      if(!r) return;
      const hasPrice = r.price != null && r.price !== '';
      const hasCost = r.cost != null && r.cost !== '';
      if(hasPrice && !hasCost){
        result.push({month:m, rowIndex:i, row:r});
      }
    });
  }
  return result;
}

/* ============================================================
   COMPUTED VALUES (the heart of the formula system)
   - data sheet "formula" columns compute per-row
   - recon sheet rows compute from data sheets
   - P&L rows pull from recon or compute via sum/formula
   ============================================================ */

// Get all rows of a data sheet (excluding empty trailing rows when reading)
function dataRows(sheetKey){
  return (STATE.data[sheetKey]||[]).filter(r => r && Object.keys(r).some(k=>r[k]!=null && r[k]!==''));
}

// For data sheets: compute a row's formula columns
function computeDataRow(sheet, row){
  const out = {...row};
  for(const col of sheet.columns){
    if(col.formula){
      try{ out[col.key] = col.formula(row); }catch(e){ out[col.key]=null; }
    }
  }
  return out;
}

// Get a recon value: recon[rowKey][store] (number or null)
function reconValue(rowKey, store, monthData){
  monthData = monthData || {data:STATE.data, inputs:STATE.inputs};
  const reconSheet = SHEETS.find(s=>s.key==='recon');
  const def = reconSheet.rows.find(r=>r.key===rowKey);
  if(!def) return null;
  // Input row
  if(def.input){
    const k = monthData.inputs.recon||{};
    return num(k[rowKey] && k[rowKey][store]);
  }
  // Formula row: aggregate from data sheets
  if(def.formula){
    // Specific aggregators
    if(rowKey==='sales_total'){
      const rows = (monthData.data.sales||[]).filter(r=>r && r.store===store);
      return rows.reduce((s,r)=>s+num(r.price),0);
    }
    if(rowKey==='rental_rev'){
      const rows = (monthData.data.rental_orders||[]).filter(r=>r && r.store===store);
      return rows.reduce((s,r)=>s+num(r.monthly_rent),0);
    }
    if(rowKey==='ar_total'){
      const rows = (monthData.data.ar||[]).filter(r=>r && r.store===store);
      return rows.reduce((s,r)=>s+(num(r.total)-num(r.received)),0);
    }
    if(rowKey==='ap_total'){
      const rows = (monthData.data.ap||[]).filter(r=>r && r.store===store);
      return rows.reduce((s,r)=>s+num(r.remain),0);
    }
    if(rowKey==='delivery_cost'){
      const rows = (monthData.data.delivery||[]).filter(r=>r && r.store===store);
      return rows.reduce((s,r)=>s+num(r.net),0);
    }
    if(rowKey==='net_sales'){
      return reconValue('sales_total',store,monthData)
        - reconValue('cancelled',store,monthData)
        - reconValue('prev_adj',store,monthData)
        + reconValue('unsold',store,monthData);
    }
  }
  return null;
}

// Get a P&L value: thisMonth or lastMonth
function plValue(store, rowKey, mode){
  // mode: 'this' or 'last'
  if(mode==='last'){
    const lastM = shiftMonth(STATE.month,-1);
    const raw = localStorage.getItem(LS_BOOK(lastM));
    if(!raw) return null;
    let lastData;
    try{ lastData = JSON.parse(raw); }catch(e){ return null; }
    return computePLValue(store,rowKey,lastData);
  }
  return computePLValue(store,rowKey,{data:STATE.data,inputs:STATE.inputs});
}

function computePLValue(store, rowKey, monthData){
  const def = PL_ROWS.find(r=>r.key===rowKey);
  if(!def) return null;
  if(def.from){
    const [src,srcKey] = def.from.split('.');
    if(src==='recon') return reconValue(srcKey,store,monthData);
  }
  if(def.sum){
    return def.sum.reduce((s,k)=>{
      const v = computePLValue(store,k,monthData);
      return s + (v===null?0:num(v));
    },0);
  }
  if(def.formula){
    if(typeof def.formula==='function'){
      // aggregator function (sales gp etc)
      if(rowKey==='gp_main'){
        const rows = (monthData.data.sales||[]).filter(r=>r && r.store===store);
        return rows.reduce((s,r)=>s+(num(r.price)-num(r.cost)),0);
      }
    } else if(typeof def.formula==='string'){
      // simple expression like "gp_total+rental_revenue-total_exp"
      const expr = def.formula.replace(/[a-z_]+/g, name=>{
        const v = computePLValue(store,name,monthData);
        return '('+num(v)+')';
      });
      try{ return eval(expr); }catch(e){ return null; }
    }
  }
  if(def.input){
    const k = monthData.inputs.pl||{};
    return num(k[store] && k[store][rowKey]);
  }
  return null;
}

/* ============================================================
   RENDER
   ============================================================ */
function init(){
  // Install global Backspace blocker FIRST, before anything else can interfere
  // Prevents browser back-navigation when a cell is selected
  document.addEventListener('keydown', e=>{
    if(e.key !== 'Backspace') return;
    const t = e.target;
    const targetMatch = t && typeof t.matches === 'function' && t.matches('input, select, textarea, [contenteditable], [contenteditable="true"]');
    console.log('[DJJ Backspace blocker]',
      'target=', t ? (t.tagName + (t.className?'.'+t.className:'') + (t.id?'#'+t.id:'')) : 'null',
      'isInput=', !!targetMatch,
      'activeEl=', document.activeElement ? document.activeElement.tagName : 'null'
    );
    if(targetMatch) return;
    console.log('[DJJ Backspace blocker] → preventDefault + stopPropagation called');
    e.preventDefault();
    e.stopPropagation();
  }, true);

  // Install global keyboard handler for cell editing/deleting/nav
  document.addEventListener('keydown', e=>{
    if(document.querySelector('td.editing')) return;
    if(e.target && typeof e.target.matches === 'function' && e.target.matches('input, select, textarea, [contenteditable]')) return;
    const td = document.querySelector('td.sel');
    if(!td){
      if(e.key==='Backspace' || e.key==='Delete'){
        console.log('[DJJ kbd] Backspace/Delete pressed but NO cell selected');
      }
      return;
    }
    const sh = SHEETS.find(s=>s.key===STATE.sheetKey);
    if(!sh || sh.kind!=='data') return;

    const key = e.key;
    if(key==='Backspace' || key==='Delete'){
      console.log('[DJJ kbd]', key, 'with cell selected — handling delete');
    }
    if(key==='Backspace' || key==='Delete'){
      e.preventDefault();
      e.stopPropagation();
      const selectedCells = document.querySelectorAll('td.sel');
      const touchedMonths = new Set();
      let changedAny = false;
      for(const cell of selectedCells){
        if(!cell.classList.contains('editable')) continue;
        const cellTr = cell.closest('tr');
        const cellMonth = (cellTr && cellTr.dataset.month) || STATE.month;
        const i = +cell.dataset.i, colKey = cell.dataset.col;
        const rows = getMonthRows(cellMonth, sh.key);
        if(rows[i] && rows[i][colKey] != null){
          delete rows[i][colKey];
          if(colKey === 'cost' && rows[i].__costFilledMonth){
            delete rows[i].__costFilledMonth;
          }
          touchedMonths.add(cellMonth);
          changedAny = true;
        }
      }
      for(const m of touchedMonths){
        saveMonthRows(m, sh.key, getMonthRows(m, sh.key));
      }
      if(changedAny){
        renderSheet();
        const restore = ()=>{
          const newTd = document.querySelector(`tr[data-month="${td.closest('tr').dataset.month}"] td[data-i="${td.dataset.i}"][data-col="${td.dataset.col}"]`);
          if(newTd) selectCell(newTd);
        };
        if(typeof requestAnimationFrame !== 'undefined') requestAnimationFrame(restore);
        else setTimeout(restore, 0);
      }
      return;
    }

    if(!td.classList.contains('editable')) return;

    if(key==='Enter' || key==='F2'){
      e.preventDefault();
      beginEditData(sh, td);
      return;
    }
    if(key.length===1 && !e.ctrlKey && !e.metaKey && !e.altKey){
      console.log('[DJJ kbd] direct typing key=', JSON.stringify(key), '→ begin edit');
      e.preventDefault();
      beginEditData(sh, td, key);
      return;
    }
    const moves = {ArrowUp:[-1,0], ArrowDown:[1,0], ArrowLeft:[0,-1], ArrowRight:[0,1]};
    if(moves[key]){
      e.preventDefault();
      const [dr,dc] = moves[key];
      const i = +td.dataset.i, colKey = td.dataset.col;
      const colIdx = sh.columns.findIndex(c=>c.key===colKey);
      const newColIdx = Math.max(0, Math.min(sh.columns.length-1, colIdx+dc));
      const newRowI = Math.max(0, i+dr);
      const newCol = sh.columns[newColIdx];
      const tr = td.closest('tr');
      const m = tr ? tr.dataset.month : STATE.month;
      const newTd = document.querySelector(`tr[data-month="${m}"] td[data-i="${newRowI}"][data-col="${newCol.key}"]`);
      if(newTd) selectCell(newTd);
    }
  }, true);  // CAPTURE phase

  loadCloudCfg();
  loadMonth(STATE.month);
  renderMonthSelect();
  renderTabs();
  renderSheet();
  wireUI();
  installColResize();
  $('#loading').style.display='none';
  $('#app').style.display='flex';
}

function renderMonthSelect(){
  const sel=$('#monthSelect'); sel.innerHTML='';
  for(const m of listMonths()){
    const o=document.createElement('option'); o.value=m; o.textContent=monthLabel(m);
    if(m===STATE.month) o.selected=true; sel.appendChild(o);
  }
}

function renderTabs(){
  const t=$('#tabs'); t.innerHTML='';
  for(const sh of SHEETS){
    const b=document.createElement('button');
    b.className='tab'+(sh.key===STATE.sheetKey?' active':'');
    b.innerHTML=`${sh.name}<span class="badge">${sh.en}</span>`;
    b.onclick=()=>{ STATE.sheetKey=sh.key; STATE.storeFilter='全部'; renderTabs(); renderSheet(); };
    t.appendChild(b);
  }
}

function renderSheet(){
  const sh = SHEETS.find(s=>s.key===STATE.sheetKey);
  const wrap = $('#sheetWrap');
  if(sh.kind==='data') renderDataSheet(sh,wrap);
  else if(sh.kind==='recon') renderReconSheet(sh,wrap);
  else if(sh.kind==='pl') renderPLSheet(sh,wrap);
}

/* ----- Data sheet (transaction list) ----- */
function renderDataSheet(sh, wrap){
  let html = `<div class="sheet-head">
    <h2>${escapeHtml(sh.name)}</h2><span class="en">${escapeHtml(sh.en)}</span>
    <span class="tag input">数据填写</span>`;
  if(sh.storeFilter){
    const opts = ['全部',...STORES];
    html+=`<div class="store-filter">
      <label>门店</label>
      <select class="ctrl" id="storeFilter">
        ${opts.map(s=>`<option value="${escapeHtml(s)}"${s===STATE.storeFilter?' selected':''}>${escapeHtml(s)}${s==='全部'?'门店':''}</option>`).join('')}
      </select>`;
    // Month filter (for sheets that have a month column = auto-month)
    const hasMonthCol = sh.columns.some(c=>c.type==='auto-month');
    if(hasMonthCol){
      const allMonths = listMonths().sort().reverse();
      html += `<label style="margin-left:8px">月份</label>
        <select class="ctrl" id="monthFilter">
          <option value="全部"${STATE.monthFilter==='全部'?' selected':''}>全部月份</option>
          ${allMonths.map(m=>`<option value="${m}"${m===STATE.monthFilter?' selected':''}>${monthLabel(m)}</option>`).join('')}
        </select>`;
    }
    html+=`</div>`;
  }
  html += `</div>
    <div class="sheet-hint">
      <span><b>白色单元格可填写</b>，灰色（序号/月份）自动，蓝色为本行公式自动算。</span>
      <span class="legend"><i class="fill-input"></i>可填</span>
      <span class="legend"><i class="fill-formula"></i>自动</span>
    </div>`;

  // Pending margin banner (sales sheet only)
  if(sh.key === 'sales'){
    const pending = scanPendingMargin();
    if(pending.length > 0){
      // Group by month
      const byMonth = {};
      for(const p of pending){
        if(!byMonth[p.month]) byMonth[p.month] = [];
        byMonth[p.month].push(p);
      }
      const monthBits = Object.keys(byMonth).sort().map(m=>{
        const items = byMonth[m].map(p=>{
          const r = p.row;
          return `${escapeHtml(r.order_no||r.model||'?')}`;
        }).join('、');
        return `<b>${escapeHtml(monthLabel(m))}</b>：${items}（${byMonth[m].length}条）`;
      }).join(' &nbsp;|&nbsp; ');
      html += `<div class="pending-banner">
        <div class="pb-icon">⚠️</div>
        <div class="pb-body">
          <div class="pb-title">共 ${pending.length} 条记录待补充<b>采购价</b>（毛利暂未计算）</div>
          <div class="pb-list">${monthBits}</div>
        </div>
      </div>`;
    }
  }

  html += `<div class="formula-bar" id="fbar"><span class="addr">—</span><span class="fx">点击单元格查看</span></div>`;
  html += `<div class="grid-scroll"><table class="grid">`;

  // Header
  html += `<thead><tr><th class="rowctrl"></th>`;
  for(const col of sh.columns){
    const w = colWidths(sh.key)[col.key];
    const style = w ? ` style="width:${w}px;min-width:${w}px;max-width:${w}px"` : '';
    html += `<th data-col="${col.key}"${style}><div class="hcell">${escapeHtml(col.label)}</div><span class="col-resize" data-col="${col.key}"></span></th>`;
  }
  html += `</tr></thead><tbody>`;

  // Rows — supports both single-month view (with subtotal) and all-months view
  const filterStore = sh.storeFilter && STATE.storeFilter!=='全部' ? STATE.storeFilter : null;
  const hasMonthCol = sh.columns.some(c=>c.type==='auto-month');

  // Decide which months to render
  const monthsToShow = (hasMonthCol && STATE.monthFilter==='全部')
    ? listMonths().sort()                      // all months ascending
    : [STATE.monthFilter==='全部' ? STATE.month : STATE.monthFilter];

  // Load data for each month
  function loadMonthData(m){
    if(m === STATE.month) return STATE.data[sh.key] || [];
    const raw = localStorage.getItem(LS_BOOK(m));
    if(!raw) return [];
    try{ const b = JSON.parse(raw); return (b.data && b.data[sh.key]) || []; }
    catch(e){ return []; }
  }

  // Cols that can be summed (money or number, but NOT formula-based)
  const sumCols = sh.columns.filter(c => (c.type==='money'||c.type==='number') && !c.formula);
  const pctCols = sh.columns.filter(c => c.type==='pct');

  // Every month is editable (not just "current month")
  const isMonthEditable = (m)=> true;

  for(const m of monthsToShow){
    const monthRows = loadMonthData(m);
    // Per-month serial counter (resets each month)
    let monthSerial = 0;
    // Filter by store
    const visible = [];
    monthRows.forEach((r,i)=>{
      if(!r) return;
      if(filterStore && r.store && r.store!==filterStore) return;
      // For all-months view, skip totally empty rows
      const hasAny = Object.keys(r).some(k=>r[k]!=null && r[k]!=='');
      if(!hasAny && monthsToShow.length>1) return;
      visible.push({row:r, index:i});
    });

    // Add trailing empty rows only when viewing this month alone (single-month view)
    const isSingleMonthView = monthsToShow.length === 1;
    if(isSingleMonthView){
      const emptyToAdd = Math.max(0, (sh.defaultEmptyRows||1));
      let lastDataIdx = -1;
      monthRows.forEach((r,i)=>{
        if(r && Object.keys(r).some(k=>r[k]!=null && r[k]!=='')) lastDataIdx=i;
      });
      const needTotal = lastDataIdx + 1 + emptyToAdd;
      while(monthRows.length < needTotal){ monthRows.push({}); }
      saveMonthRows(m, sh.key, monthRows);
      // Re-collect visible to include the newly added empties
      visible.length = 0;
      monthRows.forEach((r,i)=>{
        if(filterStore && r.store && r.store!==filterStore) return;
        visible.push({row:r, index:i});
      });
    }

    if(visible.length === 0) continue;

    // Render month rows
    for(const {row,index} of visible){
      monthSerial++;
      const isPending = sh.key==='sales' && row && row.price!=null && row.price!=='' && (row.cost==null || row.cost==='');
      const rowCls = 'mgrow' + (isPending ? ' pending-margin' : '');
      html += `<tr class="${rowCls}" data-month="${m}" data-i="${index}">`;
      if(isPending){
        html += `<td class="rowctrl pending-icon" title="待补充采购价"><span class="warn-icon">⚠</span><button class="btn-delrow" data-i="${index}" title="删除此行">−</button></td>`;
      } else {
        html += `<td class="rowctrl"><button class="btn-delrow" data-i="${index}" title="删除此行">−</button></td>`;
      }
      const computed = computeDataRow(sh,row);
      const computedWithMonth = {...computed, __rowMonth: m};
      for(const col of sh.columns){
        html += renderDataCell(sh, col, computedWithMonth, row, index, monthSerial, false);
      }
      html += `</tr>`;
    }

    // Subtotal row for this month (only if there's at least one non-empty row)
    const nonEmpty = visible.filter(v => v.row && Object.keys(v.row).some(k=>v.row[k]!=null && v.row[k]!==''));
    if(nonEmpty.length > 0 && sh.key === 'sales'){
      // === Sales sheet: 4-row breakdown (total + 3 stores) ===
      html += renderSalesMonthSummary(sh, m, nonEmpty);
      // === 调整之前月份数据 section ===
      html += renderAdjustmentSection(sh, m, nonEmpty);
    } else if(nonEmpty.length > 0){
      // Other data sheets: single row summary
      html += `<tr class="subtotal-row" data-month="${m}">`;
      html += `<td class="rowctrl"></td>`;
      let labelDone = false;
      for(const col of sh.columns){
        if(!labelDone && (col.type==='text' || col.type==='date')){
          html += `<td class="subtotal-label"><div class="cell">${escapeHtml(monthLabel(m))} 合计 · ${nonEmpty.length} 单</div></td>`;
          labelDone = true;
        } else if(sumCols.includes(col)){
          const total = nonEmpty.reduce((s,v)=>s+num(v.row[col.key]),0);
          const cls = total<0 ? ' neg' : '';
          html += `<td class="subtotal-cell num${cls}"><div class="cell">${col.type==='money'?fmtMoney(total):fmtNum(total)}</div></td>`;
        } else if(col.formula && col.type==='money'){
          const total = nonEmpty.reduce((s,v)=>{
            const computed = computeDataRow(sh,v.row);
            return s + num(computed[col.key]);
          },0);
          const cls = total<0 ? ' neg' : '';
          html += `<td class="subtotal-cell num${cls}"><div class="cell">${fmtMoney(total)}</div></td>`;
        } else {
          html += `<td class="subtotal-cell"></td>`;
        }
      }
      html += `</tr>`;
    }

    // ➕ button for THIS month
    html += `<tr class="addrow" data-month="${m}"><td colspan="${sh.columns.length+1}">
      <button class="btn-addrow">＋ 在 ${escapeHtml(monthLabel(m))} 插入一行</button>
    </td></tr>`;
  }

  // Footer
  if(sh.footer){
    const f = sh.footer;
    // Count across all months shown
    const allShownRows = monthsToShow.flatMap(m=>loadMonthData(m));
    html += `<tr class="footer-row">`;
    html += `<td class="rowctrl"></td>`;
    for(const col of sh.columns){
      if(col.key===f.label_col){
        html += `<td class="footer-label"><div class="cell">${escapeHtml(f.label)}</div></td>`;
      } else if(f.auto && col.key===f.auto.col){
        const cnt = allShownRows.filter(r=>r && r[f.auto.source]!=null && String(r[f.auto.source]).trim()!=='').length;
        html += `<td class="footer-auto"><div class="cell"><b>${escapeHtml(f.auto.label)}：</b>${cnt}</div></td>`;
      } else if(f.input && col.key===f.input.col){
        const key = `${sh.key}__${STATE.month}__${f.input.col}`;
        const stored = localStorage.getItem('djj2_finput_'+key) || '';
        html += `<td class="footer-input"><div class="cell"><b>${escapeHtml(f.input.label)}：</b>
          <input class="finput" data-key="${escapeHtml(key)}" value="${escapeHtml(stored)}" /></div></td>`;
      } else {
        html += `<td></td>`;
      }
    }
    html += `</tr>`;
  }

  html += `</tbody></table></div>`;
  wrap.innerHTML = html;
  attachDataHandlers(sh);
}

/* ----- Summary rendering helpers for sales sheet ----- */
function aggregateSalesRows(rows){
  // Returns {qty, price_total, cost_total, margin_total, margin_pct}
  let qty = 0, price = 0, cost = 0, withMargin = 0;
  for(const r of rows){
    if(!r) continue;
    qty += num(r.qty);
    price += num(r.price);
    // Only count cost if it's actually filled (otherwise it's pending)
    if(r.cost != null && r.cost !== ''){
      cost += num(r.cost);
      withMargin++;
    }
  }
  const margin = price - cost;
  const margin_pct = price ? margin / price : null;
  return {qty, price, cost, margin, margin_pct, count:rows.length};
}

function renderSalesMonthSummary(sh, m, rowsWithIdx){
  // Build a 4-row summary: total, then 3 stores
  const rows = rowsWithIdx.map(v=>v.row);
  const totalAgg = aggregateSalesRows(rows);
  const storeAggs = STORES.map(st => ({
    store: st,
    agg: aggregateSalesRows(rows.filter(r=>r.store===st)),
  }));

  let html = '';
  const colspan = sh.columns.length + 1;  // include rowctrl

  // Helper: render one summary row
  function summaryRow(label, agg, kind){
    let h = `<tr class="subtotal-row ${kind}" data-month="${m}">`;
    h += `<td class="rowctrl"></td>`;
    let labelDone = false;
    for(const col of sh.columns){
      if(!labelDone && (col.type==='text' || col.type==='date' || col.type==='auto-month')){
        h += `<td class="subtotal-label"><div class="cell">${escapeHtml(label)} · ${agg.qty} 台</div></td>`;
        labelDone = true;
      } else if(col.key === 'qty'){
        h += `<td class="subtotal-cell num"><div class="cell">${fmtNum(agg.qty)}</div></td>`;
      } else if(col.key === 'cost'){
        h += `<td class="subtotal-cell num"><div class="cell">${fmtMoney(agg.cost)}</div></td>`;
      } else if(col.key === 'price'){
        h += `<td class="subtotal-cell num"><div class="cell">${fmtMoney(agg.price)}</div></td>`;
      } else if(col.key === 'margin'){
        const cls = agg.margin<0 ? ' neg' : '';
        h += `<td class="subtotal-cell num${cls}"><div class="cell">${fmtMoney(agg.margin)}</div></td>`;
      } else if(col.key === 'margin_pct'){
        h += `<td class="subtotal-cell num pct"><div class="cell">${agg.margin_pct!=null?fmtPct(agg.margin_pct):''}</div></td>`;
      } else {
        h += `<td class="subtotal-cell"></td>`;
      }
    }
    h += `</tr>`;
    return h;
  }

  html += summaryRow(`${monthLabel(m)} 合计`, totalAgg, 'sum-total');
  for(const s of storeAggs){
    if(s.agg.count > 0){
      html += summaryRow(`${monthLabel(m)} ${s.store}小计`, s.agg, 'sum-store');
    }
  }
  return html;
}

function renderAdjustmentSection(sh, m, currentMonthRowsWithIdx){
  // 调入: rows from earlier months where __costFilledMonth === m (cost was filled this month)
  // 调出: manual input (cancelled this month's prior-month order)
  // 取消调出毛利: manual input (margin reversal for cancellations)
  const colspan = sh.columns.length + 1;

  // Find 调入 rows: scan ALL months for sales rows where __costFilledMonth === m AND the row's own month < m
  const allMonths = listMonths();
  const tiaoruRows = [];
  for(const otherMonth of allMonths){
    if(otherMonth >= m) continue;  // only earlier months
    const otherRows = getMonthRows(otherMonth, sh.key);
    otherRows.forEach((r,i)=>{
      if(!r) return;
      if(r.__costFilledMonth === m){
        tiaoruRows.push({row:r, fromMonth:otherMonth, rowIdx:i});
      }
    });
  }

  // Aggregate 调入
  const tiaoruAgg = aggregateSalesRows(tiaoruRows.map(t=>t.row));

  // Read manual inputs for 调出/取消
  const adjKey = `adj_${sh.key}_${m}`;
  const adjData = STATE.inputs[adjKey] || {};
  const tiaochuSales = num(adjData.tiaochu_sales);     // 调出销售额 (手填)
  const cancelMargin = num(adjData.cancel_margin);     // 取消调出毛利 (手填)

  // 本月真实业绩 = 本月合计 + 调入 - 调出
  const currentAgg = aggregateSalesRows(currentMonthRowsWithIdx.map(v=>v.row));
  const realSales = currentAgg.price + tiaoruAgg.price - tiaochuSales;
  const realMargin = currentAgg.margin + tiaoruAgg.margin - cancelMargin;
  const realPct = realSales ? realMargin / realSales : null;

  let html = '';
  // Section header
  html += `<tr class="adj-section-header"><td colspan="${colspan}"><div class="cell">${escapeHtml(monthLabel(m))} 调整之前月份数据</div></td></tr>`;

  // 调入 row (auto)
  html += `<tr class="adj-row adj-auto" data-month="${m}"><td colspan="${colspan}">
    <div class="adj-line">
      <span class="adj-label">调入（来自之前月份补充采购价）</span>
      <span class="adj-val">销售额 <b>${fmtMoney(tiaoruAgg.price)}</b></span>
      <span class="adj-val">毛利 <b>${fmtMoney(tiaoruAgg.margin)}</b></span>
      <span class="adj-val">${tiaoruAgg.count} 条</span>
      ${tiaoruRows.length>0?`<span class="adj-detail">${tiaoruRows.map(t=>escapeHtml((t.row.order_no||'?')+'@'+monthLabel(t.fromMonth))).join('、')}</span>`:''}
    </div>
  </td></tr>`;

  // 调出销售额 (手填)
  html += `<tr class="adj-row adj-input" data-month="${m}"><td colspan="${colspan}">
    <div class="adj-line">
      <span class="adj-label">调出（之前月份订单取消，销售额）</span>

  // 取消调出毛利 (手填)
  html += `<tr class="adj-row adj-input" data-month="${m}"><td colspan="${colspan}">
    <div class="adj-line">
      <span class="adj-label">取消调出毛利（取消订单冲销的毛利）</span>

          value="${adjData.cancel_margin!=null?escapeHtml(String(adjData.cancel_margin)):''}" placeholder="0" />
      </span>

      <span class="adj-val">真实毛利 <b class="${realMargin<0?'neg':''}">${fmtMoney(realMargin)}</b></span>
      <span class="adj-val">真实毛利率 <b>${realPct!=null?fmtPct(realPct):'—'}</b></span>
    </div>
  </td></tr>`;

  return html;
}

function renderDataCell(sh, col, computed, raw, rowIdx, serial, historicalReadonly){
  const val = computed[col.key];
  const rowMonth = computed.__rowMonth || STATE.month;
  const isAuto = col.type==='auto-serial' || col.type==='auto-month' || col.formula;
  const isText = col.type==='text' || col.type==='date' || col.type==='auto-month';
  const isMoney = col.type==='money';
  const isPct = col.type==='pct';
  const isNumber = col.type==='number';
  const editable = !isAuto && !historicalReadonly;

  let display = '';
  if(col.type==='auto-serial'){
    display = serial;
  } else if(col.type==='auto-month'){
    display = monthLabel(rowMonth);
  } else if(val===null||val===undefined||val===''){
    display = '';
  } else if(isPct){
    display = fmtPct(val);
  } else if(isMoney){
    display = fmtMoney(val);
  } else if(isNumber){
    display = fmtNum(val);
  } else {
    display = String(val);
  }

  let cls = '';
  if(isText) cls += ' label text';
  else cls += ' num';
  if(isAuto) cls += ' auto';
  if(col.formula) cls += ' formula';
  if(editable) cls += ' editable';
  if(historicalReadonly) cls += ' historical';

  let extra='';
  if(typeof val==='number' && val<0) extra=' neg';
  if(isPct) extra+=' pct';

  return `<td class="${cls}${extra}" data-i="${rowIdx}" data-col="${col.key}"><div class="cell">${escapeHtml(display)}</div></td>`;
}

function attachDataHandlers(sh){
  const tbody = $('#sheetWrap tbody');
  if(!tbody) return;

  tbody.addEventListener('click', e=>{
    // ➕ insert row into the active month (top-level month, not per-row)
    if(e.target.closest('.btn-addrow')){
      e.preventDefault();
      const addRow = e.target.closest('tr.addrow');
      const m = addRow ? (addRow.dataset.month || STATE.month) : STATE.month;
      console.log('[DJJ ➕]', 'clicked', 'addRow=', !!addRow, 'month=', m, 'sheet=', sh.key,
        'rowsBefore=', getMonthRows(m, sh.key).length);
      addMonthRow(m, sh.key);
      console.log('[DJJ ➕] addMonthRow done, rowsAfter=', getMonthRows(m, sh.key).length);
      renderSheet();
      console.log('[DJJ ➕] renderSheet done');
      return;
    }
    // − delete row
    const delBtn = e.target.closest('.btn-delrow');
    if(delBtn){
      e.preventDefault();
      const i = +delBtn.dataset.i;
      const tr = delBtn.closest('tr');
      const rowMonth = tr ? (tr.dataset.month || STATE.month) : STATE.month;
      const rows = getMonthRows(rowMonth, sh.key);
      const row = rows[i];
      const hasData = row && Object.keys(row).some(k=>{
        const col = sh.columns.find(c=>c.key===k);
        if(col && (col.type==='auto-serial'||col.type==='auto-month'||col.formula)) return false;
        if(k.startsWith('__')) return false;  // internal fields
        return row[k]!=null && row[k]!=='';
      });
      if(hasData){
        const ok = confirm('该行有数据，确认删除？\n\n（删除后无法恢复）');
        if(!ok) return;
      }
      deleteMonthRow(rowMonth, sh.key, i);
      renderSheet();
      return;
    }
    if(e.target.closest('input.finput')) return;
    const td = e.target.closest('td');
    if(!td || td.classList.contains('rowctrl')) return;
    if(td.closest('tr.addrow') || td.closest('tr.footer-row') || td.closest('tr.subtotal-row')) return;
    if(td.closest('tr.adj-row')) return;
    // Shift+click: select range from current anchor to this cell
    if(e.shiftKey){
      const anchor = document.querySelector('td.sel');
      if(anchor && anchor !== td){
        selectRange(anchor, td);
        return;
      }
    }
    selectCell(td);
  });

  // Mouse-drag selection (mousedown on cell, mousemove extends, mouseup ends)
  let dragAnchor = null;
  tbody.addEventListener('mousedown', e=>{
    if(e.button !== 0) return;  // left button only
    const td = e.target.closest('td');
    if(!td || td.classList.contains('rowctrl')) return;
    if(td.closest('tr.addrow') || td.closest('tr.footer-row') || td.closest('tr.subtotal-row')) return;
    
    if(e.target.closest('.col-resize, button, input, select')) return;
    if(e.shiftKey) return;  // shift handled in click
    dragAnchor = td;
  });
  tbody.addEventListener('mousemove', e=>{
    if(!dragAnchor || e.buttons !== 1) return;
    const td = e.target.closest('td');
    if(!td || td === dragAnchor) return;
    
    if(td.classList.contains('rowctrl')) return;
    selectRange(dragAnchor, td);
    e.preventDefault();  // prevent text selection
  });
  document.addEventListener('mouseup', ()=>{ dragAnchor = null; });

  tbody.addEventListener('dblclick', e=>{
    const td = e.target.closest('td');
    if(!td || !td.classList.contains('editable')) return;
    if(td.closest('tr.addrow') || td.closest('tr.footer-row') || td.closest('tr.subtotal-row')) return;
    
    beginEditData(sh, td);
  });

  // Keyboard: Delete/Backspace clears, Enter/F2 enters edit, direct typing replaces
  // Listen on document so it fires even if focus isn't on a cell
  // (Keyboard handler is registered globally in init() — see top of file)

  tbody.querySelectorAll('input.finput').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const k = e.target.dataset.key, v = e.target.value;
      if(v.trim()==='') localStorage.removeItem('djj2_finput_'+k);
      else localStorage.setItem('djj2_finput_'+k, v);
    });
  });

  // Adjustment input boxes
  tbody.querySelectorAll('.adj-input-box').forEach(inp=>{
    inp.addEventListener('change', e=>{
      const adjMonth = e.target.dataset.month;
      const adjKey = e.target.dataset.adjKey;
      const adjFullKey = `adj_${sh.key}_${adjMonth}`;
      if(!STATE.inputs[adjFullKey]) STATE.inputs[adjFullKey] = {};
      const v = e.target.value.trim();
      if(v===''){ delete STATE.inputs[adjFullKey][adjKey]; }
      else {
        const cleaned = v.replace(/[$,\s]/g,'');
        const n = Number(cleaned);
        STATE.inputs[adjFullKey][adjKey] = isNaN(n)?v:n;
      }
      saveMonth();
      renderSheet();
    });
  });

  const sf = $('#storeFilter');
  if(sf) sf.onchange = e=>{ STATE.storeFilter = e.target.value; renderSheet(); };
  const mf = $('#monthFilter');
  if(mf) mf.onchange = e=>{ STATE.monthFilter = e.target.value; renderSheet(); };

  // Paste handler: paste tabular data (TSV from Excel/Lark/Sheets) into multiple cells
  // Triggered when a cell is selected and Ctrl/Cmd+V is pressed (and not inside an editor).
  document.addEventListener('paste', e=>{
    // Skip if user is editing a cell or inputting in a form field
    if(document.querySelector('.editing input, .editing select')) return;
    if(e.target.matches('input, select, textarea')) return;
    const selTd = document.querySelector('td.sel');
    if(!selTd) return;
    // Only handle within a data sheet
    const curSh = SHEETS.find(s=>s.key===STATE.sheetKey);
    if(!curSh || curSh.kind!=='data') return;
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if(!text) return;
    handlePaste(curSh, selTd, text);
  });
}

function handlePaste(sh, anchorTd, text){
  // Parse clipboard text as TSV (Excel/Lark/Sheets default)
  // Strip trailing newline, split by \n, then by \t
  const lines = text.replace(/\r\n/g,'\n').replace(/\n+$/,'').split('\n');
  const grid = lines.map(line => line.split('\t'));
  if(!grid.length || !grid[0].length) return;

  const startRow = +anchorTd.dataset.i;
  const startCol = anchorTd.dataset.col;
  // Find column index in sh.columns
  const colIdx = sh.columns.findIndex(c => c.key===startCol);
  if(colIdx < 0) return;

  // Determine writable columns starting from colIdx (skip auto cols)
  const writableCols = [];
  for(let i=colIdx; i<sh.columns.length; i++){
    const c = sh.columns[i];
    if(c.type==='auto-serial' || c.type==='auto-month' || c.formula){
      writableCols.push(null);  // placeholder — will skip during paste
    } else {
      writableCols.push(c);
    }
  }

  // Ensure data array has enough rows
  if(!STATE.data[sh.key]) STATE.data[sh.key] = [];
  while(STATE.data[sh.key].length < startRow + grid.length){
    STATE.data[sh.key].push({});
  }

  // Paste cells
  let pastedCells = 0;
  for(let r=0; r<grid.length; r++){
    const rowVals = grid[r];
    for(let c=0; c<rowVals.length && c<writableCols.length; c++){
      const col = writableCols[c];
      if(!col) continue;  // auto column, skip
      const raw = rowVals[c].trim();
      const targetRow = startRow + r;
      if(raw === ''){
        delete STATE.data[sh.key][targetRow][col.key];
      } else {
        let parsed = raw;
        if(col.type==='money' || col.type==='number'){
          const cleaned = raw.replace(/[$,\s]/g,'');
          const n = Number(cleaned);
          if(!isNaN(n)) parsed = n;
        } else if(col.type==='date'){
          // Try to normalize common date formats to YYYY-MM-DD
          const d = parseDate(raw);
          if(d) parsed = d;
        } else if(col.type==='dropdown'){
          // Only accept if matches options (case insensitive)
          const match = (col.options||[]).find(o => o.toLowerCase()===raw.toLowerCase());
          if(match) parsed = match;
        }
        STATE.data[sh.key][targetRow][col.key] = parsed;
      }
      pastedCells++;
    }
  }

  saveMonth(); renderSheet();
  toast(`粘贴 ${grid.length} 行，${pastedCells} 个单元格`);
}

function parseDate(s){
  // Accept: 2026-05-04, 2026/5/4, 2026.5.4, 5/4/2026 etc
  // Returns YYYY-MM-DD or null
  s = s.trim();
  // Already ISO
  if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)){
    const [y,m,d] = s.split('-').map(Number);
    return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  // YYYY/M/D or YYYY.M.D
  let m = s.match(/^(\d{4})[\/.](\d{1,2})[\/.](\d{1,2})$/);
  if(m) return `${m[1]}-${String(+m[2]).padStart(2,'0')}-${String(+m[3]).padStart(2,'0')}`;
  // M/D/YYYY
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) return `${m[3]}-${String(+m[1]).padStart(2,'0')}-${String(+m[2]).padStart(2,'0')}`;
  // YYYY/M/D zero-pad
  return null;
}

function selectCell(td){
  document.querySelectorAll('td.sel').forEach(x=>x.classList.remove('sel'));
  td.classList.add('sel');
  td.classList.add('sel-anchor');
  const fbar = $('#fbar');
  const colKey = td.dataset.col;
  const i = td.dataset.i;
  if(fbar){
    const sh = SHEETS.find(s=>s.key===STATE.sheetKey);
    const col = sh.columns ? sh.columns.find(c=>c.key===colKey) : null;
    const lbl = col ? col.label : colKey;
    fbar.innerHTML = `<span class="addr">行${+i+1} · ${escapeHtml(lbl||colKey||'')}</span><span class="fx">${escapeHtml(td.textContent.trim() || '（空）')}</span>`;
  }
}

function selectRange(anchor, focus){
  // Select rectangular range between anchor and focus cells
  document.querySelectorAll('td.sel').forEach(x=>x.classList.remove('sel'));
  const sh = SHEETS.find(s=>s.key===STATE.sheetKey);
  if(!sh) return;
  const anchorI = +anchor.dataset.i, focusI = +focus.dataset.i;
  const anchorColIdx = sh.columns.findIndex(c=>c.key===anchor.dataset.col);
  const focusColIdx = sh.columns.findIndex(c=>c.key===focus.dataset.col);
  const r1 = Math.min(anchorI, focusI), r2 = Math.max(anchorI, focusI);
  const c1 = Math.min(anchorColIdx, focusColIdx), c2 = Math.max(anchorColIdx, focusColIdx);
  for(let i=r1; i<=r2; i++){
    for(let c=c1; c<=c2; c++){
      const col = sh.columns[c];
      const cell = document.querySelector(`tr.mgrow:not(.historical) td[data-i="${i}"][data-col="${col.key}"]`);
      if(cell) cell.classList.add('sel');
    }
  }
  // Keep anchor marker (the original anchor cell stays)
  document.querySelectorAll('td.sel-anchor').forEach(x=>x.classList.remove('sel-anchor'));
  anchor.classList.add('sel-anchor');
  const fbar = $('#fbar');
  if(fbar){
    const count = document.querySelectorAll('td.sel').length;
    fbar.innerHTML = `<span class="addr">已选 ${count} 单元格</span><span class="fx">按 Delete 批量清空</span>`;
  }
}

function beginEditData(sh, td, startWith){
  const i = +td.dataset.i;
  const colKey = td.dataset.col;
  const col = sh.columns.find(c=>c.key===colKey);
  if(!col) return;
  // Determine which month this row belongs to
  const tr = td.closest('tr');
  const rowMonth = (tr && tr.dataset.month) || STATE.month;
  const monthRows = getMonthRows(rowMonth, sh.key);
  const row = monthRows[i] || {};
  const cur = startWith != null ? startWith : (row[colKey] !== undefined ? row[colKey] : '');

  td.classList.add('editing');

  const inputType = col.type==='date' ? 'date' : 'text';
  const ph = col.placeholder ? ` placeholder="${escapeHtml(col.placeholder)}"` : '';
  td.innerHTML = `<input class="editor" type="${inputType}" value="${escapeHtml(cur===null?'':String(cur))}"${ph} />`;
  const inp = td.querySelector('input');
  inp.focus();
  if(col.type!=='date' && startWith == null) inp.select();
  if(startWith != null && col.type!=='date') inp.setSelectionRange(inp.value.length, inp.value.length);

  let committed=false;
  const commit = save=>{ if(committed)return; committed=true; td.classList.remove('editing');
    if(save){ setCell(sh,i,colKey,inp.value,rowMonth); } else { renderSheet(); } };
  inp.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'){ commit(true); }
    else if(ev.key==='Escape') commit(false);
    else if(ev.key==='Tab'){ ev.preventDefault(); commit(true); }
  });
  inp.addEventListener('blur',()=>commit(true));
}

function setCell(sh, rowIdx, colKey, value, month){
  // month param: which month this row belongs to (defaults to current)
  month = month || STATE.month;
  const col = sh.columns.find(c=>c.key===colKey);
  setMonthCell(month, sh.key, rowIdx, colKey, value, col?col.type:null);
  renderSheet();
  setSync('saving','保存中…');
  if(CLOUD.client){ cloudSaveBook().then(()=>setSync('ok','已同步云端')).catch(()=>setSync('err','云端失败')); }
  else setSync('','本地已保存');
}

function renderPLSheet(sh, wrap){
  const store = sh.store;
  const lastM = monthLabel(shiftMonth(STATE.month,-1));
  const thisM = monthLabel(STATE.month);

  let html = `<div class="sheet-head">
    <h2>${escapeHtml(sh.name)}</h2><span class="en">${escapeHtml(sh.en)}</span>
    <span class="tag auto">损益表 · 自动</span></div>
    <div class="sheet-hint">
      <span><b>${lastM}</b> = 上月对比，<b>${thisM}</b> = 本月。绿色为跨表自动，白色为手填费用。</span>
      <span class="legend"><i class="fill-linked"></i>自动</span>
      <span class="legend"><i class="fill-input"></i>手填</span>
    </div>`;
  html += `<div class="grid-scroll"><table class="grid"><thead><tr>`;
  html += `<th><div class="hcell">项目</div></th>`;
  html += `<th><div class="hcell">${escapeHtml(lastM)}</div></th>`;
  html += `<th><div class="hcell">${escapeHtml(thisM)}</div></th>`;
  html += `<th><div class="hcell">变化额</div></th>`;
  html += `<th><div class="hcell">变化率</div></th>`;
  html += `<th><div class="hcell">备注</div></th>`;
  html += `</tr></thead><tbody>`;

  for(const r of PL_ROWS){
    if(r.section){
      html += `<tr class="total"><td colspan="6"><div class="cell">${escapeHtml(r.label)}</div></td></tr>`;
      continue;
    }
    if(r.onlyStore && r.onlyStore!==store) continue;
    const last = plValue(store, r.key, 'last');
    const cur = plValue(store, r.key, 'this');
    const delta = (last!=null && cur!=null) ? (num(cur)-num(last)) : null;
    const deltaPct = (last && cur!=null) ? ((num(cur)-num(last))/Math.abs(num(last))) : null;
    const isInput = r.input;

    html += `<tr><td class="label text"><div class="cell">${escapeHtml(r.label)}</div></td>`;
    html += `<td class="num"><div class="cell">${last!=null?fmtMoney(last):''}</div></td>`;
    if(isInput){
      const note = ((STATE.inputs.pl||{})[store]||{})[r.key];
      html += `<td class="num editable" data-pl-row="${r.key}" data-store="${store}"><div class="cell">${note!=null?fmtMoney(note):''}</div></td>`;
    } else {
      const cls = cur!=null && cur<0?' neg':'';
      html += `<td class="num linked${cls}"><div class="cell">${cur!=null?fmtMoney(cur):''}</div></td>`;
    }
    const deltaCls = delta!=null && delta<0?' neg':delta>0?' pos':'';
    html += `<td class="num${deltaCls}"><div class="cell">${delta!=null?fmtMoney(delta):''}</div></td>`;
    const pctCls = deltaPct!=null && deltaPct<0?' neg':deltaPct>0?' pos':'';
    html += `<td class="num pct${pctCls}"><div class="cell">${deltaPct!=null?fmtPct(deltaPct):''}</div></td>`;
    html += `<td class="label text"><div class="cell"></div></td>`;
    html += `</tr>`;
  }
  html += `</tbody></table></div>`;
  wrap.innerHTML = html;
  attachPLHandlers(store);
}
function attachPLHandlers(store){
  const tbody = $('#sheetWrap tbody'); if(!tbody) return;
  tbody.addEventListener('dblclick', e=>{
    const td = e.target.closest('td.editable'); if(!td) return;
    const rowKey = td.dataset.plRow;
    const cur = ((STATE.inputs.pl||{})[store]||{})[rowKey];
    td.classList.add('editing');
    td.innerHTML = `<input class="editor" value="${escapeHtml(cur==null?'':String(cur))}" />`;
    const inp = td.querySelector('input'); inp.focus(); inp.select();
    let committed=false;
    const commit = save=>{ if(committed)return; committed=true; td.classList.remove('editing');
      if(save){
        if(!STATE.inputs.pl) STATE.inputs.pl = {};
        if(!STATE.inputs.pl[store]) STATE.inputs.pl[store] = {};
        const v = inp.value.trim();
        if(v===''){ delete STATE.inputs.pl[store][rowKey]; }
        else { const n=Number(v); STATE.inputs.pl[store][rowKey] = isNaN(n)?v:n; }
        saveMonth();
      }
      renderSheet();
    };
    inp.addEventListener('keydown', ev=>{
      if(ev.key==='Enter') commit(true);
      else if(ev.key==='Escape') commit(false);
    });
    inp.addEventListener('blur',()=>commit(true));
  });
}

/* ============================================================
   NEW MONTH
   ============================================================ */
function createNewMonth(newM, baseM){
  // Save current first
  saveMonth();
  // Load base month (P&L "last" column will pull from it automatically)
  // Just create empty new month — equipment will auto-carry via loadMonth's persistAcrossMonths logic
  STATE.month = newM;
  STATE.data = {};
  STATE.inputs = {};
  // Equipment: copy from baseM
  const baseRaw = localStorage.getItem(LS_BOOK(baseM));
  if(baseRaw){
    try{
      const baseBook = JSON.parse(baseRaw);
      for(const sh of SHEETS){
        if(sh.kind==='data' && sh.persistAcrossMonths && baseBook.data && baseBook.data[sh.key]){
          STATE.data[sh.key] = JSON.parse(JSON.stringify(baseBook.data[sh.key]));
        }
      }
    }catch(e){}
  }
  saveMonth();
}

/* ============================================================
   SUPABASE
   ============================================================ */
const CLOUD = {client:null, url:'', key:''};
function loadCloudCfg(){
  const raw = localStorage.getItem(LS_CLOUD); if(!raw) return;
  try{ const c = JSON.parse(raw); if(c.url && c.key) connectCloud(c.url,c.key,true); }catch(e){}
}
function connectCloud(url, key, silent){
  try{
    CLOUD.client = window.supabase.createClient(url, key);
    CLOUD.url = url; CLOUD.key = key;
    localStorage.setItem(LS_CLOUD, JSON.stringify({url,key}));
    setSync('ok','云端已连接');
    if(!silent) cloudSyncAll();
    return true;
  }catch(e){ setSync('err','连接失败'); return false; }
}
async function cloudSaveBook(){
  const body = {data:STATE.data, inputs:STATE.inputs};
  const {error} = await CLOUD.client.from('djj2_books').upsert({
    month:STATE.month, data:body, updated_at:new Date().toISOString()
  });
  if(error) throw error;
}
async function cloudSyncAll(){
  try{
    const {data, error} = await CLOUD.client.from('djj2_books').select('month,data');
    if(error) throw error;
    const months = listMonths();
    for(const row of data){
      localStorage.setItem(LS_BOOK(row.month), JSON.stringify(row.data));
      if(!months.includes(row.month)) months.push(row.month);
    }
    saveMonthsList(months);
    // Push local months not in cloud
    for(const m of months){
      if(!data.find(d=>d.month===m)){
        const raw = localStorage.getItem(LS_BOOK(m));
        if(raw){
          await CLOUD.client.from('djj2_books').upsert({month:m, data:JSON.parse(raw), updated_at:new Date().toISOString()});
        }
      }
    }
    loadMonth(STATE.month); renderMonthSelect(); renderSheet();
    toast('云端同步完成');
  }catch(e){ toast('同步失败：'+(e.message||e), true); }
}
function setSync(cls, txt){
  const el = $('#syncStatus'); el.className = 'sync-pill '+(cls||'');
  el.querySelector('.txt').textContent = txt;
}

/* ============================================================
   UI WIRING
   ============================================================ */
function wireUI(){
  $('#monthSelect').onchange = e=>{
    saveMonth();
    STATE.month = e.target.value;
    loadMonth(STATE.month);
    renderSheet();
  };
  $('#newMonthBtn').onclick = ()=>{
    const months = listMonths();
    const base = months[0];
    $('#newMonthInput').value = shiftMonth(base,1);
    const bs = $('#baseMonthSelect'); bs.innerHTML = '';
    months.forEach(m=>{ const o=document.createElement('option'); o.value=m; o.textContent=monthLabel(m); bs.appendChild(o); });
    $('#newMonthModal').classList.add('show');
  };
  $('#newMonthCancel').onclick = ()=>$('#newMonthModal').classList.remove('show');
  $('#newMonthConfirm').onclick = ()=>{
    const nm = $('#newMonthInput').value, base = $('#baseMonthSelect').value;
    if(!nm){ toast('请选择月份',true); return; }
    if(listMonths().includes(nm)){ toast('该月份已存在',true); return; }
    createNewMonth(nm, base);
    $('#newMonthModal').classList.remove('show');
    renderMonthSelect(); renderSheet();
    toast(`已创建 ${monthLabel(nm)}`);
  };
  $('#cloudBtn').onclick = ()=>{
    $('#supaUrl').value = CLOUD.url; $('#supaKey').value = CLOUD.key;
    $('#cloudModal').classList.add('show');
  };
  $('#cloudCancel').onclick = ()=>$('#cloudModal').classList.remove('show');
  $('#cloudConnect').onclick = ()=>{
    const url = $('#supaUrl').value.trim(), key = $('#supaKey').value.trim();
    if(!url || !key){ toast('请填写 URL 和 Key',true); return; }
    if(connectCloud(url,key,false)) $('#cloudModal').classList.remove('show');
  };
  $('#cloudDisconnect').onclick = ()=>{
    CLOUD.client = null; CLOUD.url=''; CLOUD.key='';
    localStorage.removeItem(LS_CLOUD);
    setSync('','本地模式'); $('#cloudModal').classList.remove('show');
    toast('已断开云端');
  };
}

window.addEventListener('DOMContentLoaded', init);
